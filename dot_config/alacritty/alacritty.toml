# Window Configuration
[window]
startup_mode = "Windowed"
opacity = 0.9
decorations = "none"

# Terminal Configuration
[terminal]


# Fonts Configuration
[font]
size = 10.0

[font.normal]
family = "Maple Mono NR NF CN"

# Key Bindings Configuration
[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[[keyboard.bindings]]
action = "Hide"
key = "H"
mods = "Super | Control"

[[keyboard.bindings]]
action = "Minimize"
key = "-"
mods = "Super | Control"

[[keyboard.bindings]]
action = "Quit"
key = "Q"
mods = "Super | Control"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F"
mods = "Super | Control"

[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Super | Control"

[scrolling]
history = 500

# Colors Configuration
[colors.primary]
foreground = "#e0def4"
background = "#191724"
dim_foreground = "#908caa"
bright_foreground = "#e0def4"

[colors.cursor]
text = "#e0def4"
cursor = "#524f67"

[colors.vi_mode_cursor]
text = "#e0def4"
